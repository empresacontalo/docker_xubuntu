version: '3.8'

services:
  xubuntu:
    # Construindo a partir do Dockerfile local para persistir programas instalados no sistema
    build: .
    image: ghcr.io/empresacontalo/docker_xubuntu:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    volumes:
      # Nesta imagem, o diretório usado para dados pessoais e configurações é o /config.
      - xubuntu_data:/config
    networks:
      # Mantendo o acesso às outras stacks (que poderão acessá-lo via xubuntu:3000 internamente)
      - app_network
      - npm_public
    ports:
      # Exportando a porta 3010 no host. 
      # ATENÇÃO: Como o Swarm não suporta 'host_ip' nesta versão de arquivo, a porta será aberta em 0.0.0.0.
      # DICA: Se você for acessar EXCLUSIVAMENTE pelo subdomínio via Nginx Proxy Manager, 
      # você pode DELETAR este bloco 'ports' inteiro por segurança, pois o NPM não precisa dele!
      - target: 3000
        published: 3010
        protocol: tcp
        mode: host
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

volumes:
  xubuntu_data:
    driver: local

networks:
  app_network:
    external: true
    name: app_network
  npm_public:
    external: true
    name: npm_public
